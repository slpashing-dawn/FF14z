<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF14z Archive</title>
    <link rel="icon" href="https://ffxiv.gamerescape.com/w/images/5/5d/Player4_Icon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ff-menu-trigger" onclick="toggleSidebar()"></div>
    <div class="ff-sidebar-mask" id="sidebarMask" onclick="toggleSidebar()"></div>
    <nav class="ff-sidebar" id="sidebar">
        <div class="ff-sidebar-close" onclick="toggleSidebar()">✕ CLOSE</div>
        <ul class="ff-side-menu">
            <li><button class="ff-menu-btn active" id="menu-home" onclick="loadHome()"><img src="https://ffxiv.gamerescape.com/w/images/2/20/MainIcon52.png"> HOME</button></li>
            <li><button class="ff-menu-btn" id="menu-character" onclick="loadPage('character-content.html', 'CHARACTER BOARD'); toggleSidebar();"><img src="https://ffxiv.gamerescape.com/w/images/0/0e/MainIcon1.png"> CHARACTER</button></li>
            <li><button class="ff-menu-btn" id="menu-gallery" onclick="loadPage('gallery-content.html', 'GALLERY BOARD'); toggleSidebar();"><img src="https://ffxiv.gamerescape.com/w/images/8/84/MainIcon88.png"> GALLERY</button></li>
            <li><button class="ff-menu-btn" id="menu-backup" onclick="loadPage('backup-content.html', 'LOGS BOARD'); toggleSidebar();"><img src="https://ffxiv.gamerescape.com/w/images/f/fb/MainIcon30.png"> BACKUP</button></li>
            <li><button class="ff-menu-btn" id="menu-notice" onclick="loadPage('notice-content.html','NOTICE BOARD'); toggleSidebar();"><img src="https://ffxiv.gamerescape.com/w/images/8/89/MainIcon5.png"> NOTICE</button></li>
            <li><button class="ff-menu-btn" id="menu-banner" onclick="navigateTo('banner')"><img src="https://ffxiv.gamerescape.com/w/images/1/1c/MainIcon65.png"> BANNER</button></li>
        </ul>
    </nav>

    <div class="ff-wrapper">
        <header class="ff-page-header">
            <h1 class="ff-archive-title" id="ff-page-main-title">FF14z ARCHIVE</h1>
        </header>

        <main id="ff-dynamic-container">
            </main>
    </div>

    <footer class="ff-footer-player">
        <div class="ff-player-main">
            <div class="ff-bgm-info">🎵 <span id="currentTitle">Night in the Brume</span> <span id="currentSub">- Ishgard Theme</span></div>
            <div class="ff-player-controls">
                <button class="ff-btn" onclick="playPrev()">⏮</button>
                <button class="ff-btn" id="playBtn" onclick="togglePlay()">PLAY</button>
                <button class="ff-btn" onclick="playNext()">⏭</button>
                <button class="ff-btn" id="repeatBtn" onclick="toggleRepeat()">REPEAT ALL</button>
                <button class="ff-btn" id="listToggleBtn" onclick="togglePlaylist()" style="margin-left: 5px;">ORCHESTRION</button>
                <input type="range"
                    id="volumeSlider"
                    class="ff-volume-slider" min="0" max="100" step="1" value="50"
                >                
            </div>
        </div>
        <div class="ff-playlist-panel" id="playlistPanel">
            <div class="ff-playlist-header">ORCHESTRION PLAYLIST</div>
            <ul class="ff-track-list">
                <li class="ff-track-item current" onclick="selectTrack(0)"><span>01. Night in the Brume</span><span>[이슈가르드]</span></li>
                <li class="ff-track-item" onclick="selectTrack(1)"><span>02. Answers</span><span>[신생 신화]</span></li>
                <li class="ff-track-item" onclick="selectTrack(2)"><span>03. Tomorrow and Tomorrow</span><span>[칠흑 감성]</span></li>
            </ul>
        </div>
    </footer>

    <aside class="ff-floating-menu">
        <div class="ff-floating-btn ff-btn-letter" id="openLetterBtn" title="모그레터 확인" onclick="openLetterModal()"></div>
        <div class="ff-floating-btn ff-btn-guestbook" id="openGuestbookBtn" title="방명록 열기" onclick="openModal('guestbookModal')"></div>
    </aside>

    <div class="ff-modal-overlay" id="letterModal">
        <div class="ff-sysmail-window">
            <div class="ff-sysmail-close" onclick="closeModal('letterModal')">✕</div>
            <div class="ff-mail-header">Mog Letter ✉️</div>
            <div class="ff-mail-content-parchment" id="letterContentTarget"></div>
            <div class="ff-mail-btn-zone">
                <button class="ff-btn-mail-confirm" onclick="closeModal('letterModal')">확인</button>
            </div>
        </div>
    </div>

    <div class="ff-modal-overlay" id="guestbookModal">
        <div class="ff-guestbook-window">
            <div class="ff-guestbook-close" onclick="closeModal('guestbookModal')">✕</div>
            <div class="ff-guestbook-header">
                <h3>📜 Guestbook (방명록)</h3>
                <button class="ff-btn-write" onclick="toggleWriteForm()">✏️ 글쓰기 열기/닫기</button>
            </div>

            <div id="ff-gb-write-box" style="display: none; background: rgba(0,0,0,0.04); border: 1px solid var(--ff-light-border); border-radius: 4px; padding: 15px; margin-bottom: 15px;">
                <div style="display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;">
                    <input type="text" id="gb-input-name" placeholder="닉네임" style="padding: 5px 10px; border: 1px solid #9f8e70; border-radius: 4px; width: 120px; font-family: inherit;">
                    <select id="gb-input-avatar" style="padding: 5px; border: 1px solid #9f8e70; border-radius: 4px; font-family: inherit;">
                        <option value="⚔️">⚔️ 투사</option>
                        <option value="🔮">🔮 마술사</option>
                        <option value="🌿">🌿 치유사</option>
                    </select>
                </div>
                <textarea id="gb-input-msg" placeholder="방명록을 남겨주세요!" rows="3" style="width: 100%; padding: 8px; border: 1px solid #9f8e70; border-radius: 4px; font-family: inherit; resize: none; margin-bottom: 10px;"></textarea>
                <div style="text-align: right;">
                    <button class="ff-btn" id="btn-save-guestbook" style="background: #463e39; color: #fff; border: 1px solid #2d2623;">방명록 등록</button>
                </div>
            </div>

            <div class="ff-guestbook-list" id="guestbookContainer">
                <div style="text-align:center; color:#8c7f76; padding:20px;">크리스탈 통신망 연결 중...</div>
            </div>

            <div class="ff-guestbook-pagination">
                <button class="ff-btn-pag" onclick="alert('첫 페이지입니다.')">◀ Prev</button>
                <span>[ 1 / 1 ]</span>
                <button class="ff-btn-pag" onclick="alert('마지막 페이지입니다.')">Next ▶</button>
            </div>
        </div>
    </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    // ★ Firestore Database 사용을 위한 라이브러리 추가 로드
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    // 보내주신 Web 앱의 Firebase 설정 값
    const firebaseConfig = {
        apiKey: "AIzaSyC-1kwJn029cDMBngPQJ_sMtM88ImcXWNQ",
        authDomain: "ffxiv-home-visitor-setting.firebaseapp.com",
        projectId: "ffxiv-home-visitor-setting",
        storageBucket: "ffxiv-home-visitor-setting.firebasestorage.app",
        messagingSenderId: "402483927908",
        appId: "1:402483927908:web:dad331bfcfc973cc4e3871",
        measurementId: "G-3THBVHST0M"
    };

    // 초기화
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // [A] 글쓰기 창 토글 함수 (전역 window 객체에 등록하여 HTML에서 버튼 클릭 가능하게 설정)
    window.toggleWriteForm = function() {
        const writeBox = document.getElementById('ff-gb-write-box');
        if (writeBox.style.display === 'none') {
            writeBox.style.display = 'block';
        } else {
            writeBox.style.display = 'none';
        }
    }

    // [B] 데이터베이스로 새 글 작성 및 전송 (보안/정렬용 타임스탬프 포함)
    document.getElementById('btn-save-guestbook').addEventListener('click', async () => {
        const nameInput = document.getElementById('gb-input-name');
        const avatarInput = document.getElementById('gb-input-avatar');
        const msgInput = document.getElementById('gb-input-msg');

        if (!nameInput.value.trim() || !msgInput.value.trim()) {
            alert("닉네임과 내용을 모두 적어주셔야 합니다.");
            return;
        }

        try {
            // Firestore의 'guestbook' 콜렉션에 데이터 추가
            await addDoc(collection(db, "guestbook"), {
                name: nameInput.value.trim(),
                avatar: avatarInput.value,
                message: msgInput.value.trim(),
                createdAt: new Date() // 정렬용 현재 시간
            });

            // 작성 칸 초기화 및 닫기
            nameInput.value = "";
            msgInput.value = "";
            window.toggleWriteForm();
            alert("방명록이 모그레터를 타고 성공적으로 전달되었습니다!");

        } catch (error) {
            console.error("Firebase 저장 에러: ", error);
            alert("통신 오류가 발생했습니다. 파이어베이스 콘솔에서 Firestore Database가 활성화되었는지 확인해 주세요!");
        }
    });

    // [C] 데이터베이스로부터 실시간(onSnapshot) 데이터 가져와서 그리기
    // 최신 글이 가장 위로 오도록 내림차순(desc) 정렬 쿼리 구성
    const q = query(collection(db, "guestbook"), orderBy("createdAt", "desc"));

    onSnapshot(q, (snapshot) => {
        const container = document.getElementById('guestbookContainer');
        container.innerHTML = ""; // 기존 목록 비우기

        if (snapshot.empty) {
            container.innerHTML = `<div style="text-align:center; color:#8c7f76; padding:30px;">아직 작성된 방명록이 없습니다. 첫 발자국을 남겨보세요!</div>`;
            return;
        }

        snapshot.forEach((doc) => {
            const data = doc.data();
            
            // 날짜 포맷 예쁘게 변환 (YYYY.MM.DD HH:MM)
            let dateString = "방금 전";
            if (data.createdAt) {
                const date = data.createdAt.toDate();
                dateString = `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
            }

            // 아이템 구조 HTML 생성
            const itemHTML = `
                <div class="ff-guestbook-item">
                    <div class="ff-guestbook-avatar">${data.avatar || '⚔️'}</div>
                    <div class="ff-guestbook-body">
                        <div class="ff-guestbook-meta">
                            <span class="ff-guestbook-name">${escapeHtml(data.name)}</span>
                            <span class="ff-guestbook-date">${dateString}</span>
                        </div>
                        <div class="ff-guestbook-msg">${escapeHtml(data.message)}</div>
                    </div>
                </div>
            `;
            container.innerHTML += itemHTML;
        });
    });

    // XSS 방지용 보안 텍스트 변환기
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
</script>
<div id="yt-hidden-player"
     style="position:absolute;left:-9999px;top:-9999px;">
</div>
</body>
</html>
